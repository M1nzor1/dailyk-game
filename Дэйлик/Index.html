<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROBIK: Robo-Raid</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f11; color: white; font-family: -apple-system, sans-serif; margin: 0; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; max-width: 380px; height: 95vh; justify-content: space-between; padding: 10px 0; }
        
        #balance-box { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(0,0,0,0.6)); padding: 6px 20px; border-radius: 20px; font-weight: 900; color: #ffd700; border: 1px solid #ffd700; font-size: 16px; box-shadow: 0 0 15px rgba(255,215,0,0.1); display: flex; align-items: center; gap: 5px; justify-content: center; }
        #streak { font-size: 60px; font-weight: 900; color: #ff4500; line-height: 0.8; margin-top: 5px; }
        
        #mid-block { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #name { font-size: 22px; font-weight: 900; margin-bottom: 2px; letter-spacing: 1px; cursor: pointer; border-bottom: 2px dashed rgba(255,215,0,0.4); padding-bottom: 2px; color: #fff; }
        img#petImg { width: 65vw; max-width: 220px; filter: drop-shadow(0 0 20px rgba(0,122,255,0.2)); transition: transform 0.3s; margin-top: 5px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 90%; margin-top: 5px; }
        button { border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        
        .btn-check { width: 90%; height: 50px; background: linear-gradient(135deg, #007aff, #0056b3); color: white; font-size: 15px; }
        .btn-invite { width: 90%; height: 50px; background: linear-gradient(135deg, #34c759, #248a3d); color: white; font-size: 15px; }
        
        .btn-game { height: 65px; background: #1c1c1e; color: #ffd700; border: 1px solid #333; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
        .btn-game span { font-size: 20px; }
        
        .btn-raid { background: linear-gradient(135deg, #ff4500, #ff8c00); color: white; grid-column: span 2; height: 55px; font-size: 14px; border: 1px solid #fff; margin-bottom: 5px;}

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f11; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        
        /* РЕЙД ИНТЕРФЕЙС */
        .raid-card-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 95%; margin: 20px 0; }
        .raid-card { aspect-ratio: 2/3; background: #2c2c2e; border: 2px solid #444; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .raid-info { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; width: 80%; margin-bottom: 10px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; max-height: 50vh; overflow-y: auto; padding: 10px; }
        .card-item { width: 100%; aspect-ratio: 3/4; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; background-size: cover; background-position: center; position: relative; }
        .card-count { position: absolute; bottom: -5px; right: -5px; background: #ff4500; color: white; font-weight: bold; padding: 2px 6px; border-radius: 10px; font-size: 12px; }
        
        .unc { border: 2px solid #a3a3a3; }
        .rar { border: 2px solid #007aff; }
        .epi { border: 2px solid #8a2be2; }
        .leg { border: 2px solid #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .locked { filter: grayscale(100%) opacity(0.3); border: 2px dashed #444; }
        
        #cardPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #popupImg { width: 60vw; max-width: 250px; aspect-ratio: 3/4; border-radius: 10px; background: #222; background-size: cover; background-position: center; }
        .coin-icon { width: 25px; height: 25px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <div id="top">
            <div id="balance-box">
                <img src="coin1.png" class="coin-icon" alt="💰"> 
                <span id="balance">0</span> RobCoins
            </div>
            <div id="streak">0</div>
            <div style="font-size: 10px; color: #888; font-weight: bold;">ДНЕЙ ВМЕСТЕ</div>
        </div>

        <div id="mid-block">
            <div id="name" onclick="renamePet()">СИРИЧИК</div>
            <img id="petImg" src="stage0.png">
        </div>

        <div id="bottom" style="width: 100%;">
            <button class="btn-game btn-raid" onclick="startRaid()">🔥 ВЫЛАЗКА (20 💰) 🔥</button>
            <div class="menu-grid">
                <button class="btn-game" onclick="startGame('snake')"><span>🐍</span>ЗМЕЙКА</button>
                <button class="btn-game" onclick="startGame('rocket')"><span>🚀</span>РАКЕТА</button>
                <button class="btn-game" onclick="showShop()"><span>🛒</span>МАГАЗИН</button>
                <button class="btn-game" onclick="showLibrary()"><span>🗂</span>КОЛЛЕКЦИЯ</button>
            </div>
            <button id="actBtn" class="btn-check" onclick="checkIn()" style="display:none; margin: 10px auto;">ОТМЕТИТЬСЯ</button>
            <button id="invBtn" class="btn-invite" onclick="inviteFriend()" style="display:none; margin: 10px auto;">ПОЗВАТЬ ДРУГА</button>
        </div>
    </div>

    <!-- ОКНО РЕЙДА -->
    <div id="raidOverlay" class="overlay">
        <h2 style="color: #ff4500; margin: 0;">ЭТАЖ: <span id="raidFloor">1</span>/20</h2>
        <div class="raid-info">
            <div style="font-size: 14px; color: #888;">В СЕЙФЕ:</div>
            <div style="font-size: 20px; color: #ffd700; font-weight: bold;">
                <span id="raidBankCoins">0</span> 💰 | <span id="raidBankCards">0</span> 🎴
            </div>
        </div>
        <div class="raid-card-box">
            <div class="raid-card" onclick="chooseRaidCard()">❓</div>
            <div class="raid-card" onclick="chooseRaidCard()">❓</div>
            <div class="raid-card" onclick="chooseRaidCard()">❓</div>
            <div class="raid-card" onclick="chooseRaidCard()">❓</div>
            <div class="raid-card" onclick="chooseRaidCard()">❓</div>
        </div>
        <p style="font-size: 12px; color: #666;">Найди монеты или робота, но не попадись на ЛОМ!</p>
        <button onclick="endRaid(true)" style="background:#34c759; color:white; width:200px; height:50px; border-radius:15px; margin-top:10px; font-weight:bold;">💰 СБЕЖАТЬ И ЗАБРАТЬ</button>
    </div>

    <!-- ДРУГИЕ ОКНА (МАГАЗИН, КОЛЛЕКЦИЯ И Т.Д.) -->
    <div id="shopOverlay" class="overlay">
        <h2 style="color: #ffd700;">МАГАЗИН</h2>
        <div id="packContainer" onclick="buyPack()" style="border:2px dashed #ffd700; padding:20px; border-radius:20px;">
            <img src="pack1.png" style="height:100px;"><br>ОТКРЫТЬ ПАК (100 💰)
        </div>
        <button onclick="closeMenu('shopOverlay')" style="margin-top:20px;">НАЗАД</button>
    </div>

    <div id="libraryOverlay" class="overlay">
        <h2>КОЛЛЕКЦИЯ</h2>
        <div class="card-grid" id="cardGrid"></div>
        <button onclick="closeMenu('libraryOverlay')" style="margin-top:20px;">НАЗАД</button>
    </div>

    <div id="cardPopup" onclick="closePopup()">
        <h1 id="popupRarity">ВЫПАЛО!</h1>
        <div id="popupImg"></div>
    </div>

    <script>
        const shortName = "seriychik"; 
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyArraBpwbrf-5LDYR2-xuXfObfW3gF40Fw",
            authDomain: "dailykgame-d75d8.firebaseapp.com",
            databaseURL: "https://dailykgame-d75d8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dailykgame-d75d8",
            appId: "1:762552994938:web:2fdfb8758aa0899e2c6eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = tg.initDataUnsafe?.user?.id?.toString();
        
        let currentPairId = null, globalBalance = 0, currentName = "СИРИЧИК";
        let myCards = {};
        let raidData = { floor: 1, bankCoins: 0, bankCards: [] };

        const cardDB = [
            { id: "unc1", img: "unc1.png", rare: "unc" }, { id: "unc2", img: "unc2.png", rare: "unc" }, { id: "unc3", img: "unc3.png", rare: "unc" },
            { id: "rar1", img: "rar1.png", rare: "rar" }, { id: "rar2", img: "rar2.png", rare: "rar" }, { id: "rar3", img: "rar3.png", rare: "rar" },
            { id: "epi1", img: "epi1.png", rare: "epi" }, { id: "epi2", img: "epi2.png", rare: "epi" }, { id: "epi3", img: "epi3.png", rare: "epi" },
            { id: "leg1", img: "leg1.png", rare: "leg" }, { id: "leg2", img: "leg2.png", rare: "leg" }, { id: "leg3", img: "leg3.png", rare: "leg" },
            { id: "fail", img: "fail.png", rare: "fail" } // КАРТА ПРОИГРЫША
        ];

        // --- ЛОГИКА ВЫЛАЗКИ ---
        function startRaid() {
            if (globalBalance < 20) return alert("Нужно 20 монет!");
            db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance - 20 });
            raidData = { floor: 1, bankCoins: 0, bankCards: [] };
            updateRaidUI();
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('raidOverlay').style.display = 'flex';
        }

        function chooseRaidCard() {
            const chance = Math.random() * 100;
            tg.HapticFeedback.impactOccurred('medium');

            if (chance < 20) { // 20% шанс проиграть
                alert("💥 БА-БАХ! Ты попал на СЛОМАННОГО РОБОТА!");
                showPopup("ЛОМ! ТЫ ВСЁ ПОТЕРЯЛ", "fail.png", "fail");
                endRaid(false);
            } else if (chance < 35) { // 15% шанс найти карту
                const randomCard = cardDB[Math.floor(Math.random() * (cardDB.length - 1))];
                raidData.bankCards.push(randomCard.id);
                alert(`📦 Нашел карту: ${randomCard.id}! Она в сейфе.`);
                nextFloor();
            } else { // 65% шанс найти монеты
                const win = Math.floor(Math.random() * 40) + 10;
                raidData.bankCoins += win;
                nextFloor();
            }
        }

        function nextFloor() {
            if (raidData.floor >= 20) {
                alert("🏆 ТЫ ПРОШЕЛ ВСЕ 20 ЭТАЖЕЙ! ПОБЕДА!");
                endRaid(true);
            } else {
                raidData.floor++;
                updateRaidUI();
            }
        }

        function updateRaidUI() {
            document.getElementById('raidFloor').innerText = raidData.floor;
            document.getElementById('raidBankCoins').innerText = raidData.bankCoins;
            document.getElementById('raidBankCards').innerText = raidData.bankCards.length;
        }

        function endRaid(isWin) {
            if (isWin) {
                let updates = { balance: globalBalance + raidData.bankCoins };
                raidData.bankCards.forEach(cardId => {
                    myCards[cardId] = (myCards[cardId] || 0) + 1;
                });
                updates['cards'] = myCards;
                db.ref(`pairs/${currentPairId}`).update(updates);
                alert(`💰 Ты вынес из рейда ${raidData.bankCoins} монет и ${raidData.bankCards.length} карт!`);
            }
            document.getElementById('raidOverlay').style.display = 'none';
            document.getElementById('mainUI').style.display = 'flex';
        }

        // --- СТАНДАРТНЫЕ ФУНКЦИИ ---
        if (myId) {
            db.ref('users/' + myId + '/partner').on('value', snap => {
                const pId = snap.val();
                if (pId) {
                    currentPairId = myId < pId ? `${myId}_${pId}` : `${pId}_${myId}`;
                    db.ref(`pairs/${currentPairId}`).on('value', p => {
                        const d = p.val() || {};
                        globalBalance = d.balance || 0;
                        currentName = d.name || "СИРИЧИК";
                        myCards = d.cards || {};
                        document.getElementById('balance').innerText = globalBalance;
                        document.getElementById('streak').innerText = d.streak || 0;
                        document.getElementById('name').innerText = currentName;
                        document.getElementById('actBtn').style.display = 'block';
                    });
                } else {
                    document.getElementById('invBtn').style.display = 'block';
                }
            });
        }

        function showPopup(text, img, rarity) {
            const pR = document.getElementById('popupRarity');
            const pI = document.getElementById('popupImg');
            pR.innerText = text;
            pI.style.backgroundImage = `url('${img}')`;
            pI.className = rarity;
            document.getElementById('cardPopup').style.display = 'flex';
        }

        function buyPack() {
            if (globalBalance < 100) return alert("Мало монет!");
            const rand = Math.random() * 100;
            if (rand < 40) {
                const coins = Math.floor(Math.random() * 91) + 10;
                db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance - 100 + coins });
                showPopup(`ВЫПАЛО ${coins} МОНЕТ!`, "coin1.png", "unc");
            } else {
                db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance - 100 });
                const card = cardDB[Math.floor(Math.random() * (cardDB.length - 1))];
                myCards[card.id] = (myCards[card.id] || 0) + 1;
                db.ref(`pairs/${currentPairId}/cards`).set(myCards);
                showPopup("НОВАЯ КАРТА!", card.img, card.rare);
            }
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = "";
            cardDB.forEach(c => {
                if(c.id === 'fail') return;
                const count = myCards[c.id] || 0;
                grid.innerHTML += `<div class="card-item ${count > 0 ? c.rare : 'locked'}" style="background-image: url('${c.img}')">
                    ${count > 0 ? `<div class="card-count">x${count}</div>` : "🔒"}
                </div>`;
            });
        }

        function showLibrary() { renderCards(); document.getElementById('mainUI').style.display='none'; document.getElementById('libraryOverlay').style.display='flex'; }
        function showShop() { document.getElementById('mainUI').style.display='none'; document.getElementById('shopOverlay').style.display='flex'; }
        function closeMenu(id) { document.getElementById(id).style.display='none'; document.getElementById('mainUI').style.display='flex'; }
        function closePopup() { document.getElementById('cardPopup').style.display = 'none'; }
        function inviteFriend() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/DailykDuoBot/${shortName}?startapp=${myId}&text=Стань моим напарником в ROBIK!`); }
    </script>
</body>
</html>
