<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Streak Duo: Snake Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f11; color: white; font-family: -apple-system, sans-serif; margin: 0; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; max-width: 380px; height: 95vh; justify-content: space-between; padding: 15px 0; }
        
        #top-block { display: flex; flex-direction: column; align-items: center; }
        #balance-box { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(0,0,0,0.4)); padding: 8px 20px; border-radius: 20px; font-weight: 900; color: #ffd700; border: 1px solid #ffd700; font-size: 18px; box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        #streak { font-size: 70px; font-weight: 900; color: #ff4500; line-height: 0.8; margin: 10px 0 0 0; }
        
        #mid-block { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #name { font-size: 24px; font-weight: 900; margin-bottom: 15px; letter-spacing: 1px; }
        img#petImg { width: 80vw; max-width: 300px; filter: drop-shadow(0 0 20px rgba(0,122,255,0.2)); }
        
        #bottom-block { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        button { border-radius: 20px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; width: 90%; }
        .btn-check { height: 55px; background: linear-gradient(135deg, #007aff, #0056b3); color: white; font-size: 16px; }
        .btn-snake { height: 65px; background: linear-gradient(135deg, #ffd700, #b8860b); color: black; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(218,165,32,0.3); }
        
        #delBtn { background: transparent; color: #444; font-size: 11px; text-decoration: underline; margin-top: 5px; width: auto; }

        /* ЭКРАН ЗМЕЙКИ */
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #gameCanvas { background: #050505; border: 3px solid #222; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 80px); gap: 12px; margin-top: 20px; }
        .g-btn { width: 80px; height: 80px; background: #1c1c1e; border-radius: 20px; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .g-btn:active { background: #333; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <div id="top-block">
            <div id="balance-box">💰 <span id="balance">0</span> RobCoins</div>
            <div id="streak">0</div>
            <div style="font-size: 10px; color: #888; font-weight: bold;">ДНЕЙ ВМЕСТЕ</div>
        </div>

        <div id="mid-block">
            <div id="name">СИРИЧИК</div>
            <img id="petImg" src="stage0.png">
        </div>

        <div id="bottom-block">
            <button class="btn-check" onclick="checkIn()">ОТМЕТИТЬСЯ</button>
            <button class="btn-snake" onclick="startSnake()">🐍 ИГРАТЬ В ЗМЕЙКУ</button>
            <button id="delBtn" onclick="deletePair()">разорвать пару</button>
        </div>
    </div>

    <div id="gameOverlay">
        <div id="gameScore" style="font-size: 28px; font-weight: 900; color: #ffd700; margin-bottom: 10px;">0</div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div class="controls">
            <div></div><div class="g-btn" ontouchstart="changeDir(0,-10)">▲</div><div></div>
            <div class="g-btn" ontouchstart="changeDir(-10,0)">◀</div><div class="g-btn" ontouchstart="changeDir(0,10)">▼</div><div class="g-btn" ontouchstart="changeDir(10,0)">▶</div>
        </div>
        <button onclick="exitGame()" style="background:#ff3b30; color:white; width:120px; height:40px; border-radius:12px; margin-top:20px; font-weight:bold;">ВЫЙТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0f0f11');

        const firebaseConfig = {
            apiKey: "AIzaSyArraBpwbrf-5LDYR2-xuXfObfW3gF40Fw",
            authDomain: "dailykgame-d75d8.firebaseapp.com",
            databaseURL: "https://dailykgame-d75d8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dailykgame-d75d8",
            appId: "1:762552994938:web:2fdfb8758aa0899e2c6eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = tg.initDataUnsafe?.user?.id?.toString();
        let currentPairId = null, globalBalance = 0;

        if (myId) {
            db.ref('users/' + myId + '/partner').on('value', snap => {
                const partnerId = snap.val();
                if (partnerId) {
                    currentPairId = myId < partnerId ? `${myId}_${partnerId}` : `${partnerId}_${myId}`;
                    db.ref(`pairs/${currentPairId}`).on('value', p => {
                        const d = p.val() || {streak: 0, balance: 0, name: 'СИРИЧИК'};
                        globalBalance = d.balance || 0;
                        document.getElementById('balance').innerText = globalBalance;
                        document.getElementById('streak').innerText = d.streak;
                        document.getElementById('name').innerText = d.name;
                    });
                }
            });
        }

        // --- ЛОГИКА ЗМЕЙКИ ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let snake, food, dx, dy, score, gameLoop;

        function startSnake() {
            if (!currentPairId) return alert("Нужен друг!");
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('gameOverlay').style.display = 'flex';
            resetGame();
            gameLoop = setInterval(draw, 100);
        }

        function resetGame() {
            snake = [{x: 150, y: 150}, {x: 140, y: 150}];
            food = {x: 80, y: 80};
            dx = 10; dy = 0; score = 0;
            document.getElementById('gameScore').innerText = "0";
        }

        function changeDir(nx, ny) {
            if (nx !== -dx && ny !== -dy) { 
                dx = nx; dy = ny; 
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function draw() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= 300 || head.y < 0 || head.y >= 300 || snake.some(s => s.x === head.x && s.y === head.y)) {
                clearInterval(gameLoop);
                db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance + score });
                tg.HapticFeedback.notificationOccurred('error');
                alert("КОНЕЦ ИГРЫ! Счёт: " + score);
                exitGame();
                return;
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('gameScore').innerText = score;
                food = {x: Math.floor(Math.random()*29)*10, y: Math.floor(Math.random()*29)*10};
                tg.HapticFeedback.impactOccurred('medium');
            } else { snake.pop(); }

            ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
            ctx.fillStyle = "#00ff00"; snake.forEach(s => ctx.fillRect(s.x, s.y, 9, 9));
            ctx.fillStyle = "#ff3b30"; ctx.fillRect(food.x, food.y, 9, 9);
        }

        function exitGame() {
            clearInterval(gameLoop);
            document.getElementById('mainUI').style.display = 'flex';
            document.getElementById('gameOverlay').style.display = 'none';
        }

        function deletePair() {
            if (!confirm("Уверен? Всё будет удалено!")) return;
            const partnerId = currentPairId.replace(myId, "").replace("_", "");
            db.ref('users/'+myId+'/partner').remove();
            db.ref('users/'+partnerId+'/partner').remove();
            db.ref('pairs/'+currentPairId).remove();
            location.reload();
        }

        function checkIn() { tg.HapticFeedback.impactOccurred('heavy'); }
    </script>
</body>
</html>
