<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Streak Duo: Game Zone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f11; color: white; font-family: -apple-system, sans-serif; margin: 0; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 380px; }
        #balance-box { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(0,0,0,0.5)); padding: 8px 20px; border-radius: 25px; font-weight: 900; color: #ffd700; border: 1px solid #ffd700; font-size: 18px; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        #streak { font-size: 70px; font-weight: 900; color: #ff4500; line-height: 0.8; margin: 5px 0; }
        img#petImg { width: 35vw; max-width: 140px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 5px; }
        button { border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-main { grid-column: span 2; height: 55px; background: linear-gradient(135deg, #007aff, #0056b3); color: white; font-size: 16px; }
        .btn-game { height: 65px; background: #1c1c1e; color: #ffd700; border: 1px solid #333; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* КНОПКА УДАЛЕНИЯ (ТО ЧТО ТЫ ПРОСИЛ) */
        #delBtn { background: transparent; color: #444; font-size: 10px; margin-top: 15px; text-decoration: underline; padding: 10px; }
        
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #050505; border: 2px solid #333; border-radius: 15px; }
        .controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; margin-top: 15px; }
        .g-btn { width: 75px; height: 75px; background: #2c2c2e; border-radius: 20px; color: white; font-size: 25px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <div id="balance-box">💰 <span id="balance">0</span> RobCoins</div>
        <div id="streak">0</div>
        <div style="font-size: 10px; color: #888; font-weight: bold; letter-spacing: 2px;">ДНЕЙ ВМЕСТЕ</div>
        <div id="name" style="font-size: 20px; font-weight: 900; margin: 5px 0;">СИРИЧИК</div>
        <img id="petImg" src="stage0.png">

        <button class="btn-main" onclick="checkIn()" id="actBtn">ОТМЕТИТЬСЯ</button>

        <div class="menu-grid">
            <button class="btn-game" onclick="startSnake()"><span>🐍</span>ЗМЕЙКА</button>
            <button class="btn-game" onclick="startRocket()"><span>🚀</span>РАКЕТА</button>
        </div>
        
        <button id="delBtn" onclick="deletePair()">РАЗОРВАТЬ ПАРУ И СТЕРЕТЬ ВСЁ</button>
        <div id="status" style="font-size: 11px; color: #555;">Система готова</div>
    </div>

    <div id="gameOverlay">
        <div id="gameScore" style="font-size: 24px; font-weight: 900; margin-bottom: 5px;">0</div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div class="controls" id="snakeControls">
            <div></div><div class="g-btn" ontouchstart="changeDir(0,-10)">▲</div><div></div>
            <div class="g-btn" ontouchstart="changeDir(-10,0)">◀</div><div class="g-btn" ontouchstart="changeDir(0,10)">▼</div><div class="g-btn" ontouchstart="changeDir(10,0)">▶</div>
        </div>
        <div class="controls" id="rocketControls" style="display:none;">
            <div class="g-btn" ontouchstart="move(-1)" ontouchend="move(0)">◀</div>
            <div style="width:75px"></div>
            <div class="g-btn" ontouchstart="move(1)" ontouchend="move(0)">▶</div>
        </div>
        <button onclick="exitGame()" style="background:#ff3b30; color:white; width:100px; height:40px; border-radius:10px; margin-top:15px;">ВЫЙТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const firebaseConfig = {
            apiKey: "AIzaSyArraBpwbrf-5LDYR2-xuXfObfW3gF40Fw",
            authDomain: "dailykgame-d75d8.firebaseapp.com",
            databaseURL: "https://dailykgame-d75d8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dailykgame-d75d8",
            appId: "1:762552994938:web:2fdfb8758aa0899e2c6eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = tg.initDataUnsafe?.user?.id?.toString();
        let currentPairId = null, globalBalance = 0, activeGame = null;

        if (myId) {
            db.ref('users/' + myId + '/partner').on('value', snap => {
                const partnerId = snap.val();
                if (partnerId) {
                    currentPairId = myId < partnerId ? `${myId}_${partnerId}` : `${partnerId}_${myId}`;
                    db.ref(`pairs/${currentPairId}`).on('value', p => {
                        const d = p.val() || {streak: 0, balance: 0, name: 'СИРИЧИК'};
                        globalBalance = d.balance || 0;
                        document.getElementById('balance').innerText = globalBalance;
                        document.getElementById('streak').innerText = d.streak;
                        document.getElementById('name').innerText = d.name;
                    });
                }
            });
        }

        // --- ОБЩАЯ ЛОГИКА ИГР ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let gameLoop, score, snake, food, dx, dy, player, enemies, dir = 0;

        function startSnake() {
            if (!currentPairId) return alert("Нужен друг!");
            activeGame = "snake";
            openOverlay("snakeControls");
            resetSnake();
            gameLoop = setInterval(drawSnake, 100);
        }

        function startRocket() {
            if (!currentPairId) return alert("Нужен друг!");
            activeGame = "rocket";
            openOverlay("rocketControls");
            resetRocket();
            gameLoop = setInterval(drawRocket, 20);
        }

        function openOverlay(ctrlId) {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('gameOverlay').style.display = 'flex';
            document.getElementById('snakeControls').style.display = ctrlId === 'snakeControls' ? 'grid' : 'none';
            document.getElementById('rocketControls').style.display = ctrlId === 'rocketControls' ? 'grid' : 'none';
        }

        function exitGame() {
            clearInterval(gameLoop);
            document.getElementById('mainUI').style.display = 'flex';
            document.getElementById('gameOverlay').style.display = 'none';
        }

        // --- ЗМЕЙКА ---
        function resetSnake() { snake = [{x:150,y:150}]; food = {x:100,y:100}; dx=10; dy=0; score=0; }
        function changeDir(nx, ny) { if (nx !== -dx && ny !== -dy) { dx = nx; dy = ny; } }
        function drawSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x<0 || head.x>=300 || head.y<0 || head.y>=300 || snake.some(s=>s.x===head.x&&s.y===head.y)) return end(score);
            snake.unshift(head);
            if (head.x===food.x && head.y===food.y) { score++; food={x:Math.floor(Math.random()*29)*10, y:Math.floor(Math.random()*29)*10}; } else { snake.pop(); }
            ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
            ctx.fillStyle="lime"; snake.forEach(s=>ctx.fillRect(s.x,s.y,9,9));
            ctx.fillStyle="red"; ctx.fillRect(food.x,food.y,9,9);
            document.getElementById('gameScore').innerText = score;
        }

        // --- РАКЕТА ---
        function resetRocket() { player={x:135,y:250}; enemies=[]; score=0; dir=0; }
        function move(d) { dir = d; }
        function drawRocket() {
            ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
            player.x += dir*5;
            ctx.fillStyle="#007aff"; ctx.fillRect(player.x, 260, 30, 30);
            if (Math.random()<0.05) enemies.push({x:Math.random()*280, y:-20, s:3+Math.random()*3});
            enemies.forEach((en, i) => {
                en.y += en.s; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(en.x,en.y,8,0,7); ctx.fill();
                if (en.y>260 && en.y<290 && en.x>player.x && en.x<player.x+30) return end(Math.floor(score/5));
                if (en.y>300) { enemies.splice(i,1); score++; document.getElementById('gameScore').innerText = score; }
            });
        }

        function end(reward) {
            clearInterval(gameLoop);
            db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance + reward });
            tg.HapticFeedback.notificationOccurred('success');
            alert("ФИНИШ! + " + reward + " RobCoins");
            exitGame();
        }

        function deletePair() {
            if (!confirm("💀 УВЕРЕН? Это сотрет ВСЮ серию и ВСЕ монеты навсегда!")) return;
            const partnerId = currentPairId.replace(myId, "").replace("_", "");
            db.ref('users/'+myId+'/partner').remove();
            db.ref('users/'+partnerId+'/partner').remove();
            db.ref('pairs/'+currentPairId).remove();
            location.reload();
        }

        function checkIn() { /* тут твоя логика ричков */ tg.HapticFeedback.impactOccurred('heavy'); }
    </script>
</body>
</html>
