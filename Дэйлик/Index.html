<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Streak Duo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        body {
            background-color: #0f0f11; color: #ffffff; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden; user-select: none;
        }
        .top-section { text-align: center; margin-top: 20px; }
        #pet-name { font-size: 22px; font-weight: bold; color: #fff; cursor: pointer; text-decoration: underline dashed #555; }
        #streak-count { font-size: 80px; font-weight: 900; color: #ff4500; margin: 0; }
        .img-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #pet-img { width: 80vw; max-width: 350px; transition: transform 0.2s; }
        .bottom-section { width: 90%; margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; }
        button {
            width: 100%; height: 60px; border-radius: 16px; border: none;
            font-size: 18px; font-weight: 800; cursor: pointer;
        }
        #btn-invite { background-color: #34c759; color: white; }
        #btn-action { background-color: #007aff; color: white; display: none; }
        #btn-action:disabled { background-color: #2c2c2e; color: #636366; }
        #timer { text-align: center; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="top-section">
        <div id="pet-name" onclick="changeName()">СИРИЧИК</div>
        <div id="streak-count">0</div>
        <div style="font-size: 12px; color: #666;">ДНЕЙ СЕРИИ</div>
    </div>

    <div class="img-container">
        <img id="pet-img" src="stage0.png">
    </div>

    <div class="bottom-section">
        <button id="btn-invite" onclick="inviteFriend()">ПОЗВАТЬ ДРУГА</button>
        <button id="btn-action" onclick="makeCheckIn()">ОТМЕТИТЬСЯ</button>
        <div id="timer">Ожидание подключения...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные твоего Firebase (уже исправленные)
        const firebaseConfig = {
            apiKey: "AIzaSyArraBpwbrf-5LDYR2-xuXfObfW3gF40Fw",
            authDomain: "dailykgame-d75d8.firebaseapp.com",
            databaseURL: "https://dailykgame-d75d8-default-rtdb.firebaseio.com/",
            projectId: "dailykgame-d75d8",
            appId: "1:762552994938:web:2fdfb8758aa0899e2c6eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let streak = 0;
        let lastTime = 0;
        let petName = 'СИРИЧИК';
        
        // Получаем ID пользователя из Телеграма
        const myId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "test";
        const startParam = tg.initDataUnsafe.start_param;

        // Создаем общий ID для пары
        let pairId = null;
        if (startParam) {
            pairId = (myId < startParam) ? `${myId}_${startParam}` : `${startParam}_${myId}`;
        }

        if (pairId) {
            document.getElementById('btn-invite').style.display = 'none';
            document.getElementById('btn-action').style.display = 'block';

            // Слушаем базу
            db.ref('pairs/' + pairId).on('value', (snap) => {
                const data = snap.val() || { streak: 0, lastTime: 0, name: 'СИРИЧИК' };
                streak = data.streak;
                lastTime = data.lastTime;
                petName = data.name;
                updateUI();
            });
        }

        function updateUI() {
            document.getElementById('pet-name').innerText = petName;
            document.getElementById('streak-count').innerText = streak;
            
            // Смена картинок в зависимости от очков
            const img = document.getElementById('pet-img');
            if (streak >= 50) img.src = 'stage50.png';
            else if (streak >= 20) img.src = 'stage20.png';
            else if (streak >= 10) img.src = 'stage10.png';
            else img.src = 'stage0.png';

            checkTimer();
        }

        function checkTimer() {
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            const btn = document.getElementById('btn-action');
            const timerEl = document.getElementById('timer');

            if (now - lastTime < oneDay) {
                btn.disabled = true;
                btn.innerText = 'УЖЕ ГОТОВО';
                const diff = oneDay - (now - lastTime);
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                timerEl.innerText = `Доступно через: ${h}ч ${m}м`;
            } else {
                btn.disabled = false;
                btn.innerText = 'ОТМЕТИТЬСЯ НА СЕГОДНЯ';
                timerEl.innerText = 'Сиричик ждет тебя!';
            }
        }

        function makeCheckIn() {
            db.ref('pairs/' + pairId).update({
                streak: streak + 1,
                lastTime: Date.now()
            });
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function inviteFriend() {
            // Теперь ссылка создается с твоим реальным ID
            const link = `https://t.me/DailykDuoBot/app?startapp=${myId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Залетай растить сиричика со мной!`);
        }

        function changeName() {
            const n = prompt('Как назовем?', petName);
            if (n && pairId) db.ref('pairs/' + pairId).update({ name: n });
        }

        setInterval(checkTimer, 60000);
    </script>
</body>
</html>
