<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Streak Duo: Economy Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f11; color: white; font-family: -apple-system, sans-serif; margin: 0; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; max-width: 380px; height: 95vh; justify-content: space-between; padding: 15px 0; }
        #balance-box { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(0,0,0,0.4)); padding: 8px 20px; border-radius: 20px; font-weight: 900; color: #ffd700; border: 1px solid #ffd700; font-size: 18px; }
        #streak { font-size: 70px; font-weight: 900; color: #ff4500; line-height: 0.8; margin-top: 10px; }
        #mid-block { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100% }
        #name { font-size: 24px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; cursor: pointer; border-bottom: 2px dashed rgba(255,215,0,0.4); padding-bottom: 2px; color: #fff; }
        img#petImg { width: 75vw; max-width: 280px; filter: drop-shadow(0 0 20px rgba(0,122,255,0.2)); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 10px; }
        button { border-radius: 20px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-check { width: 90%; height: 55px; background: linear-gradient(135deg, #007aff, #0056b3); color: white; font-size: 16px; }
        .btn-game { height: 70px; background: #1c1c1e; color: #ffd700; border: 1px solid #333; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .btn-game span { font-size: 22px; }
        #delBtn { background: transparent; color: #444; font-size: 10px; text-decoration: underline; margin-top: 5px; }
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #050505; border: 2px solid #333; border-radius: 15px; }
        .controls { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; margin-top: 20px; }
        .g-btn { width: 75px; height: 75px; background: #2c2c2e; border-radius: 20px; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <div id="top">
            <div id="balance-box">💰 <span id="balance">0</span> RobCoins</div>
            <div id="streak">0</div>
            <div style="font-size: 10px; color: #888; font-weight: bold;">ДНЕЙ ВМЕСТЕ</div>
        </div>

        <div id="mid-block">
            <div id="name" onclick="renamePet()">СИРИЧИК</div>
            <div style="font-size: 9px; color: #ffd700; margin-top: -5px; margin-bottom: 10px;">(смена: 50 💰)</div>
            <img id="petImg" src="stage0.png">
        </div>

        <div id="bottom">
            <button class="btn-check" onclick="checkIn()">ОТМЕТИТЬСЯ</button>
            <div class="menu-grid">
                <button class="btn-game" onclick="startGame('snake')"><span>🐍</span>ЗМЕЙКА</button>
                <button class="btn-game" onclick="startGame('rocket')"><span>🚀</span>РАКЕТА</button>
            </div>
            <button id="delBtn" onclick="deletePair()">разорвать пару</button>
        </div>
    </div>

    <div id="gameOverlay">
        <div id="gameScore" style="font-size: 32px; font-weight: 900; color: #ffd700; margin-bottom: 10px;">0</div>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div class="controls" id="snakeCtrl">
            <div></div><div class="g-btn" ontouchstart="changeDir(0,-10)">▲</div><div></div>
            <div class="g-btn" ontouchstart="changeDir(-10,0)">◀</div><div class="g-btn" ontouchstart="changeDir(0,10)">▼</div><div class="g-btn" ontouchstart="changeDir(10,0)">▶</div>
        </div>
        <div class="controls" id="rocketCtrl" style="display:none;">
            <div class="g-btn" ontouchstart="moveRocket(-1)" ontouchend="moveRocket(0)">◀</div>
            <div style="width:75px"></div>
            <div class="g-btn" ontouchstart="moveRocket(1)" ontouchend="moveRocket(0)">▶</div>
        </div>
        <button onclick="exitGame()" style="background:#ff3b30; color:white; width:120px; height:45px; border-radius:15px; margin-top:25px; font-weight:bold;">ВЫЙТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyArraBpwbrf-5LDYR2-xuXfObfW3gF40Fw",
            authDomain: "dailykgame-d75d8.firebaseapp.com",
            databaseURL: "https://dailykgame-d75d8-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "dailykgame-d75d8",
            appId: "1:762552994938:web:2fdfb8758aa0899e2c6eb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = tg.initDataUnsafe?.user?.id?.toString();
        let currentPairId = null, globalBalance = 0, gameLoop, score, currentName = "";

        if (myId) {
            db.ref('users/' + myId + '/partner').on('value', snap => {
                const pId = snap.val();
                if (pId) {
                    currentPairId = myId < pId ? `${myId}_${pId}` : `${pId}_${myId}`;
                    db.ref(`pairs/${currentPairId}`).on('value', p => {
                        const d = p.val() || {streak: 0, balance: 0, name: 'СИРИЧИК'};
                        globalBalance = d.balance || 0;
                        currentName = d.name || "СИРИЧИК";
                        document.getElementById('balance').innerText = globalBalance;
                        document.getElementById('streak').innerText = d.streak;
                        document.getElementById('name').innerText = currentName;
                    });
                }
            });
        }

        // --- ЛОГИКА СМЕНЫ ИМЕНИ ЗА 50 МОНЕТ ---
        function renamePet() {
            if (!currentPairId) return;

            // Если имя еще стандартное - даем сменить бесплатно один раз
            const isFirstTime = (currentName === "СИРИЧИК");

            if (!isFirstTime && globalBalance < 50) {
                alert("Недостаточно RobCoins! Нужно 50 💰");
                return;
            }

            const costText = isFirstTime ? "Первая смена бесплатно!" : "Это будет стоить 50 RobCoins!";
            const newName = prompt(costText + "\nКак назовем?", currentName);

            if (newName && newName.length > 0 && newName.length < 15 && newName.toUpperCase() !== currentName) {
                const updates = { name: newName.toUpperCase() };
                
                // Если не бесплатно, вычитаем монеты
                if (!isFirstTime) {
                    updates.balance = globalBalance - 50;
                }

                db.ref(`pairs/${currentPairId}`).update(updates);
                tg.HapticFeedback.notificationOccurred('success');
                if (!isFirstTime) alert("Имя успешно изменено! Списано 50 💰");
            }
        }

        // --- ОСТАЛЬНАЯ ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ) ---
        function checkIn() {
            if (!currentPairId) return;
            const today = new Date().toISOString().split('T')[0];
            db.ref(`pairs/${currentPairId}/clicks/${myId}`).set(today);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let snake, food, dx, dy, player, enemies, rocketDir = 0;

        function startGame(type) {
            if (!currentPairId) return;
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('gameOverlay').style.display = 'flex';
            document.getElementById('snakeCtrl').style.display = type === 'snake' ? 'grid' : 'none';
            document.getElementById('rocketCtrl').style.display = type === 'rocket' ? 'grid' : 'none';
            score = 0;
            if (type === 'snake') { snake = [{x:150,y:150}]; food = {x:80,y:80}; dx=10; dy=0; gameLoop = setInterval(drawSnake, 100); }
            else { player = {x:135, y:260}; enemies = []; gameLoop = setInterval(drawRocket, 20); }
        }

        function exitGame() { clearInterval(gameLoop); document.getElementById('mainUI').style.display = 'flex'; document.getElementById('gameOverlay').style.display = 'none'; }
        function drawSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x<0||head.x>=300||head.y<0||head.y>=300||snake.some(s=>s.x===head.x&&s.y===head.y)) return endGame(score);
            snake.unshift(head);
            if (head.x===food.x&&head.y===food.y) { score++; food={x:Math.floor(Math.random()*29)*10, y:Math.floor(Math.random()*29)*10}; } else { snake.pop(); }
            ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
            ctx.fillStyle="lime"; snake.forEach(s=>ctx.fillRect(s.x,s.y,9,9));
            ctx.fillStyle="red"; ctx.fillRect(food.x,food.y,9,9);
            document.getElementById('gameScore').innerText = score;
        }
        function moveRocket(d) { rocketDir = d; }
        function drawRocket() {
            ctx.fillStyle="black"; ctx.fillRect(0,0,300,300);
            player.x += rocketDir*5;
            if (player.x<0) player.x=0; if (player.x>270) player.x=270;
            ctx.fillStyle="#007aff"; ctx.fillRect(player.x, 260, 30, 30);
            if (Math.random()<0.06) enemies.push({x:Math.random()*280, y:-20, s:3+Math.random()*4});
            enemies.forEach((en, i) => {
                en.y += en.s; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(en.x,en.y,8,0,7); ctx.fill();
                if (en.y>260 && en.y<290 && en.x>player.x && en.x<player.x+30) return endGame(Math.floor(score/5));
                if (en.y>300) { enemies.splice(i,1); score++; document.getElementById('gameScore').innerText = score; }
            });
        }
        function endGame(reward) {
            clearInterval(gameLoop);
            db.ref(`pairs/${currentPairId}`).update({ balance: globalBalance + reward });
            tg.HapticFeedback.notificationOccurred('success');
            exitGame();
        }
        function changeDir(nx, ny) { if (nx !== -dx && ny !== -dy) { dx = nx; dy = ny; } }
        function deletePair() { if (confirm("УДАЛИТЬ ВСЁ?")) { db.ref('pairs/'+currentPairId).remove(); location.reload(); } }
    </script>
</body>
</html>
